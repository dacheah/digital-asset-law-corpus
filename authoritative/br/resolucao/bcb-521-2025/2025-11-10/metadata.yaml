provenance_note: 'Resolução BCB nº 521, de 10 de novembro de 2025 (Banco Central do Brasil) — the FOREIGN-EXCHANGE-INTEGRATION
  resolution of the Banco Central''s virtual-asset framework under Brazil''s Marco Legal dos Ativos Virtuais
  (Lei nº 14.478/2022). It is an AMENDING resolution: it alters Resoluções BCB nº 277, 278 and 279, de
  31 de dezembro de 2022 (which regulate the Brazilian FX Law, Lei nº 14.286/2021) to bring the activities
  and operations of virtual-asset service providers (PSAVs) into the mercado de câmbio (foreign-exchange
  market) and to address Brazilian-capital-abroad and foreign-capital-in-country situations; the preamble
  cites art. 7º, V, of Lei 14.478/2022 and Decreto 11.563/2023. It has 6 own articles (Art. 1º amends
  Res 277 — adding a CAPÍTULO ÚNICO and art. 76-A on virtual-asset services in the FX market; Art. 2º–3º
  add/replace Anexos to Res 277; Art. 4º–5º amend Res 278 and 279; Art. 6º sets a PHASED commencement)
  plus the provisions it quotes from the amended resolutions and two ANEXOs (Anexo I = new Anexo II-A
  of Res 277, on information to be reported to the BCB; Anexo II = the revised ''Operações especiais''
  classification-codes table of Anexo V of Res 277). COMMENCEMENT (Art. 6º): 4 May 2026 for the reporting/information
  provisions listed in item I, and 2 Feb 2026 for the remaining provisions. RELATIONSHIP: companion to
  Resoluções BCB nº 519 (authorisation) and nº 520 (operating rules), all implementing Lei 14.478/2022.
  Cross-referenced in related_documents → br/lei/virtual-assets-framework-2022 and br/resolucao/bcb-520-2025.
  AUTHENTIC LANGUAGE: Portuguese (pt-BR); English unofficial → derived. AUTHORITATIVENESS: authentic_text
