provenance_note: 'Resolução BCB nº 520, de 10 de novembro de 2025 (Banco Central do Brasil) — the Banco
  Central''s substantive IMPLEMENTING REGULATION of the virtual-asset market under Brazil''s Marco Legal
  dos Ativos Virtuais (Lei nº 14.478/2022; the resolution''s preamble cites arts. 2º–5º, 7º, 8º and 9º
  of that Lei and Decreto nº 11.563/2023). This is Brazil''s Track A market-structure operating regime:
  it disciplines the constitution and functioning of the sociedades prestadoras de serviços de ativos
  virtuais (SPSAVs / VASPs), defining the service-provider modalities and the core operating framework
  — definitions (CAPÍTULO II: airdrop, ativo virtual referenciado em moeda fiduciária (stablecoin), carteira
  fria/quente/morna (cold/hot/warm wallets), chave privada, contrato inteligente, etc.), authorisation-to-operate
  conditions, asset segregation, custody, governance, risk management, cybersecurity, conduct and activity
  restrictions, through 92 articles in 11 chapters, plus an ANEXO (minimum requirements for selecting
  virtual assets to offer). RELATIONSHIP: this is the implementing rule to the enabling statute, cross-referenced
  in related_documents → br/lei/virtual-assets-framework-2022 (the statute↔rule pairing, as with the US
  GENIUS Act ↔ OCC payment-stablecoins rule). Its companion resolutions — nº 519 (authorisation/licensing)
  and nº 521 (integration of virtual-asset international payments into the FX framework) — are queued
  as follow-ups (JC-023). Entry into force 2 Feb 2026 (Art. 92). AUTHENTIC LANGUAGE: Portuguese (pt-BR);
  English renderings unofficial → derived. AUTHORITATIVENESS: authentic_text — the official BCB normativo
  publication, as issued (no amendments). SOURCE/FORMAT: because the BCB normativo site renders via JavaScript,
  the official text was captured as a browser print-to-PDF (the cookie-consent banner dismissed first);
  original.pdf is the byte-exact print anchor; text.txt is the enacted text (title → ementa → preamble
  → CAPÍTULOs I–XI, Art. 1º–92 with §§/incisos/alíneas → signature → ANEXO with its footnotes), with DISCLOSED
  removal of the browser print header line and the BCB website footer only (the ''Siga o BC'' social-media
  links, ''Acesso à informação'', the BCB mission statement, ''Atendimento: 145'', and the copyright line).
  Page-width line wraps (Latin, word-boundary; no hyphenation) are rejoined with a single space; the whitespace-stripped
  text is an exact match to the whitespace-stripped captured body (no operative content added, lost, or
  reordered), and the 92 articles form a complete consecutive sequence ending in the in-force article,
  signature and annex. LICENCE: br-law-noncopyright — Lei 9.610/1998 Art. 8, IV (JC-021/023). Recorded
  on its own terms (JC-003/JC-007/JC-023).'
