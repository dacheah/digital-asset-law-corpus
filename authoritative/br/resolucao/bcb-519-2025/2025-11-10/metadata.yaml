provenance_note: 'Resolução BCB nº 519, de 10 de novembro de 2025 (Banco Central do Brasil) — the AUTHORISATION
  / LICENSING resolution of the Banco Central''s virtual-asset framework under Brazil''s Marco Legal dos
  Ativos Virtuais (Lei nº 14.478/2022). It disciplines the processos de autorização (authorization processes)
  for the constitution and functioning of FX brokers (sociedades corretoras de câmbio), securities brokers
  and dealers (corretoras/distribuidoras de títulos e valores mobiliários) AND virtual-asset service providers
  (sociedades prestadoras de serviços de ativos virtuais / PSAVs) — the licensing gateway: minimum requirements
  (economic-financial capacity, governance, IT infrastructure, capital/equity), transfer of control, corporate
  reorganisation, appointment of administrators, and grant/denial procedures. 28 articles in 10 chapters
  (CAPÍTULO I–X). Entry into force 2 Feb 2026 (Art. 28). RELATIONSHIP: companion to Resolução BCB nº 520
  (operating/prudential/conduct rules) and nº 521 (FX integration) — the three together implement Lei
  14.478/2022 (the resolution''s preamble cites it). Cross-referenced in related_documents → br/lei/virtual-assets-framework-2022
  and br/resolucao/bcb-520-2025. AUTHENTIC LANGUAGE: Portuguese (pt-BR); English unofficial → derived.
  AUTHORITATIVENESS: authentic_text — the official BCB normativo publication, as issued. SOURCE/FORMAT:
  captured as a browser print-to-PDF of the JS-rendered BCB page (cookie banner dismissed); original.pdf
  is the byte-exact anchor; text.txt is the enacted text (title → ementa → preamble → CAPÍTULOs I–X, Art.
  1º–28 with §§/incisos/alíneas → signature), with DISCLOSED removal of the browser print header and the
  BCB website footer only; page-width Latin word-boundary wraps (no hyphenation) rejoined with a single
  space; the whitespace-stripped text is an exact match to the whitespace-stripped captured body (no operative
  content added, lost, or reordered), and the 28 articles form a complete consecutive sequence ending
  in the in-force article and signature. LICENCE: br-law-noncopyright — Lei 9.610/1998 Art. 8, IV (JC-021/023).
  Recorded on its own terms (JC-003/JC-007/JC-023).'
