rights_note: 'Under the Brazilian Copyright Law (Lei de Direitos Autorais, Lei nº 9.610/1998), Article
  8, item IV, ''os textos de tratados ou convenções, leis, decretos, regulamentos, decisões judiciais
  e demais atos oficiais'' (the texts of treaties or conventions, laws, decrees, regulations, judicial
  decisions and other official acts) are ''não são objeto de proteção como direitos autorais'' (not the
  subject of copyright protection). A federal statute (lei) is squarely within Art. 8, IV, so the authentic
  Portuguese text is freely reproducible (analogous to Japan''s Copyright Act Art. 13, mainland China''s
  Copyright Law Art. 5, and Korea''s Copyright Act Art. 7, reached via the ''official texts'' route).
  Source: the official Planalto site (planalto.gov.br). Any English rendering is UNOFFICIAL and belongs
  in the derived layer.'
