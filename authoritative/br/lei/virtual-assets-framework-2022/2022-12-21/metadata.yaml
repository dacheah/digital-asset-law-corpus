provenance_note: 'Lei nº 14.478, de 21 de dezembro de 2022 (the ''Marco Legal dos Ativos Virtuais'' /
  Legal Framework for Virtual Assets), Brazil — the official Planalto text, as enacted (no inline amendments
  present). This is Brazil''s Track A market-structure ENABLING STATUTE: it sets diretrizes (guidelines)
  for the prestação de serviços de ativos virtuais (provision of virtual-asset services), defines ATIVO
  VIRTUAL (virtual asset, Art. 3) and PRESTADORA DE SERVIÇOS DE ATIVOS VIRTUAIS (virtual-asset service
  provider / VASP, Art. 5), requires VASPs to be authorised by a federal body designated by the Executive
  (Art. 2), creates a fraud offence involving virtual assets by amending the Código Penal (Decreto-Lei
  2.848/1940), and brings VASPs within the crimes-against-the-financial-system (Lei 7.492/1986) and anti-money-laundering
  (Lei 9.613/1998) regimes. It comprises 14 articles (Art. 1º–Art. 14; Art. 14 sets a 180-day commencement,
  i.e. in force 20 Jun 2023), plus the quoted Penal-Code provision it inserts. IMPLEMENTING REGULATION
  (queued, NOT in this record): the Banco Central do Brasil — designated regulator per Decreto 11.563/2023
  — issued the comprehensive VASP framework as Resoluções BCB nº 519, 520 e 521 (published 10 Nov 2025,
  effective 2 Feb 2026); these are queued as implementing regulation, cross-referenced to this Lei (the
  same statute-then-rule split as the US GENIUS Act + OCC rule). AUTHENTIC LANGUAGE: Portuguese (pt-BR)
  — the corpus''s FIRST non-English authentic text in the LATIN script (after the CJK/Hangul branches
  JP/CN/KR), and the branch that opens LATIN AMERICA. English renderings are unofficial → derived. AUTHORITATIVENESS:
  authentic_text — the official Planalto publication of the enacted law. SOURCE/FORMAT: original.html
  is the byte-exact Planalto page (Windows-1252 as served); text.txt is extracted from its <p> elements
  (title → ementa → enactment clause → Art. 1º–Art. 14 with parágrafos/incisos → Brasília date → signatories),
  with DISCLOSED removal of Planalto page furniture only (the ''Presidência da República … Subchefia''
  header, the ''Regulamento/Vigência'' navigation links, and the ''Este texto não substitui o publicado
  no DOU'' footer note). No operative content added, lost, or reordered: every extracted paragraph is
  present verbatim in the page''s text, and the text was cross-checked against the live Planalto page.
  LICENCE: br-law-noncopyright — Lei 9.610/1998 Art. 8, IV excludes official texts from copyright (JC-021).
  Follow-ups queued: the BCB Resolutions 519/520/521; an unofficial English rendering in the derived layer.
  Recorded on its own terms (JC-003/JC-007/JC-021).'
