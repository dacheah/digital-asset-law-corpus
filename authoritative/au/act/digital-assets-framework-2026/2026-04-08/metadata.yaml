provenance_note: 'Corporations Amendment (Digital Assets Framework) Act 2026 (Cth) — the AS-MADE amending
  Act (No. 38, 2026; C2026A00038). Royal Assent 8 April 2026; registered on the Federal Register of Legislation
  10 April 2026. It AMENDS the Corporations Act 2001 and the Australian Securities and Investments Commission
  Act 2001, inserting the digital-asset / digital-asset-platform (DAP) regime on an AFSL-licensing basis
  (administered by Treasury; implemented by ASIC). COMMENCEMENT is staged per the Act''s section 2 (effective_date
  left null). original.pdf is the authenticated ''Authorised Version'' PDF and is the byte-exact integrity
  anchor. text.txt is taken from the official Federal Register of Legislation Word (DOCX) rendering of
  the same Act — chosen because it is free of the PDF''s page apparatus (running headers, footers, page
  numbers) — with tabs and non-breaking hyphens preserved. CROSS-CHECKED against the authenticated PDF:
  every DOCX word reconciles with the PDF (zero DOCX-only tokens); the only PDF-only tokens are page apparatus
  and the Federal Register URL. SCOPE (see branches/au/02-au-scope-amendment.md): this captures the amending
  Act as enacted. FOLLOW-UPS queued: the compiled Corporations Act 2001 digital-asset provisions — to
  be ingested as an AUTHORITATIVE official consolidation (Australian compilations are authoritative, unlike
  EUR-Lex consolidations, JC-009); and ASIC legislative instruments + Treasury DAP rules on finalisation.
  ASIC no-action positions and transitional relief are NOT law and are out of scope. OBI: neutral public
  record (low-risk); any monetisation needs employer OBI + IP clearance first (branches/au/01-au-licensing.md).
  Recorded on its own terms — no cross-jurisdiction relationship encoded in the authoritative layer (JC-003/JC-007).'
