provenance_note: 'Malta''s Virtual Financial Assets Act (Chapter 590), one of the earliest comprehensive
  crypto frameworks (originally Act of 2018): it regulates VFA issuers (ICOs / whitepapers), VFA agents
  and VFA service providers under the MFSA. English and Maltese are equally authentic (Maltese prevails);
  stored as parallel authentic-language records under one corpus_id (JC-013). Captured as the official
  consolidated text revised to 16 May 2025. AUTHORITATIVENESS: official_consolidation. LICENCE: mt-law-noncopyright
  (Copyright Act Cap. 415 Art. 2). Much of the regime now runs alongside the EU MiCA framework. Recorded
  neutrally.'
