provenance_note: 'Digital Assets Law (DIFC Law No. 2 of 2024) — the Dubai International Financial Centre''s
  digital-asset law, enacted 1 March 2024 and in force 8 March 2024. A common-law statute (English authoritative)
  that establishes legal principles for digital assets: it defines a Digital Asset and its legal characterisation
  as intangible property (Part 2), the law of CONTROL and TITLE — how control is established and how title
  transfers, including good-faith acquisition (Part 3), holder/custody OBLIGATIONS (Part 4), and miscellaneous/consequential
  provisions with power to make Regulations (Part 5), plus Schedule 1 (interpretation and defined terms)
  and Schedule 2 (disapplications/modifications to other DIFC laws for digital-asset scenarios). 16 articles
  in 5 Parts. This is the DIFC free-zone regime — a distinct legal system within the UAE (cf. Hong Kong),
  recorded separately from the Dubai/VARA and federal regimes (JC-028/030). AUTHENTIC LANGUAGE: English.
  AUTHORITATIVENESS: authentic_text — the official DIFC consolidated publication. FIDELITY (see verification
  block): text.txt is an EXACT alphanumeric match to the pdftotext -layout extraction of original.pdf
  (delta 0) minus the disclosed apparatus (running header, page numbers, title page/table of contents);
  5 Parts and the article sequence verified. LICENCE: difc-official-legislation (official DIFC law; JC-030).
  Recorded neutrally (JC-003/JC-006).'
