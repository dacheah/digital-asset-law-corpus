provenance_note: 'Singapore''s digital-token-service-provider regime: Part 9 of the Financial Services
  and Markets Act 2022 (ss. 136–167), which licenses persons that provide a digital token service and
  carries an extraterritorial hook (a person with a place of business in Singapore providing a digital
  token service outside Singapore must be licensed). English authentic; Part 9 commenced 30 June 2025.
  Cross-linked to the Payment Services Act (DPT services). AUTHORITATIVENESS: authentic_text. LICENCE:
  sso-agc-permission. Recorded neutrally.'
