provenance_note: 'Payment Services Act 2019 (Act 2 of 2019), Singapore — the CURRENT IN-FORCE consolidated
  version from Singapore Statutes Online (SSO), ''current version as at 09 Jul 2026''. This is Singapore''s
  Track A market-structure spine: it licenses DIGITAL PAYMENT TOKEN (DPT) service providers alongside
  other payment services. Originally commenced 28 Jan 2020 (except ss. 111, 113, 114, which had later/appointed
  commencement); the consolidated text incorporates later amendments (e.g. Act 1 of 2021, Act 12 of 2024),
  whose inline ''[Act X of YYYY wef DD/MM/YYYY]'' annotations are RETAINED from the SSO output. English
  is the single authentic language. AUTHORITATIVENESS: Singapore''s Revised Edition / current SSO version
  has legal force, so this consolidated text is AUTHORITATIVE (recorded as official_consolidation) — like
  AU compilations, unlike EU consolidations (JC-009). original.pdf is the SSO PDF (byte-exact anchor);
  text.txt is from pdftotext with disclosed cleaning (wording unchanged): the 3-line SSO per-page apparatus
  (''Singapore Statutes Online'' / ''Current version as at ...'' / ''PDF created date ...'') stripped;
  the SSO-generated Table of Contents (navigation, not enacted text) omitted; wrapped lines rejoined;
  soft hyphens stripped. Cross-check: the cleaned text is a faithful subset of the raw extraction (only
  added token is ''SSO'' in the title line). LICENCE: sso-agc-permission — reproduction expressly permitted
  with attribution (JC-014). Follow-up queued: the FSMA 2022 digital-token-service-provider (DTSP) provisions;
  the MAS single-currency-stablecoin framework only if legislated. Recorded on its own terms (JC-003/JC-007).'
