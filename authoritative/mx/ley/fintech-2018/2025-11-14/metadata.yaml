provenance_note: 'Mexico''s Ley para Regular las Instituciones de Tecnología Financiera (''Ley Fintech'',
  DOF 9 Mar 2018) — the framework for financial-technology institutions; its virtual-asset provisions
  (Arts 30–34) permit ITFs to operate with ''activos virtuales'' subject to Banco de México authorisation.
  Spanish authentic; captured as the consolidated text (última reforma 14 Nov 2025). The whole law is
