provenance_note: 'The DLT Act — Federal Act on the Adaptation of Federal Law to Developments in the Technology
  of Distributed Electronic Registers — Switzerland''s foundational digital-asset instrument, adopted
  by the Federal Assembly on 25 September 2020 (Official Compilation AS/RO/RU 2021 33). It is a *Mantelerlass*
  (blanket act): its Section I amends TEN existing federal enactments — (1) the Code of Obligations (ledger-based
  securities / Registerwertrechte, Art. 973d ff.), (2) the Debt Enforcement and Bankruptcy Act, (3) the
  Private International Law Act, (4) the Financial Services Act (FinSA), (5) the National Bank Act, (6)
  the Banking Act (segregation of crypto-based assets in insolvency), (7) the Financial Institutions Act
  (FinIA), (8) the Anti-Money Laundering Act, (9) the Intermediated Securities Act, and (10) the Financial
  Market Infrastructure Act (FinfraG) — whose Track A market-structure core is the new ''DLT trading facility''
  (DLT-Handelssystem) licence: a licensed multilateral trading venue for DLT securities open to retail
  participants, supervised by FINMA. Section II subjects the act to the optional referendum and leaves
  entry into force to the Federal Council; it is signed by the presidents and secretaries of both chambers
  (25 Sep 2020). The Federal Council decree (11 Dec 2020) records the unused referendum deadline (14 Jan
  2021) and set the Code-of-Obligations and related provisions in force on 1 February 2021, the remainder
  (incl. the FinfraG DLT trading facility) on 1 August 2021. AUTHENTIC LANGUAGE: this record holds the
  German authentic text; German, French and Italian are equally authentic (none is a translation) — the
  parallel-language versions share this corpus_id with language-suffixed version_ids (the Hong Kong parallel-authentic
  model, JC-013/027). English is unofficial → derived. SOURCE/FORMAT: captured from Fedlex (Swiss Confederation,
  Federal Chancellery) as the official as-adopted PDF/A of the Official Compilation (the ''signed electronic
  version is authoritative''); original.pdf is the byte-exact anchor. FIDELITY (see verification block):
  text.txt was extracted with a two-column-aware, position/size-based parser (marginal titles/Randtitel
  separated from the body column; running headers, page/print numbers and the masthead dropped as apparatus;
  the 31 numbered SR/BBl cross-reference footnotes collected in a closing section). Completeness is proven
  by span accounting — every character of an INDEPENDENT pdftotext extraction is accounted for (alnum
  delta = 0) — and the end-matter (referendum clause, both chambers'' signatories, and the Federal Council
  entry-into-force decree) was independently cross-checked against the live Fedlex source. LICENCE: ch-law-noncopyright
  — Swiss Copyright Act (SR 231.1) Art. 5 (JC-027). Recorded neutrally, on its own terms (JC-003/JC-005/JC-006).'
