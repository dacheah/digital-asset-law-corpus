rights_note: 'Under the Swiss Federal Act on Copyright and Related Rights (URG/CopA, SR 231.1), Article
  5 (''Amtliche Werke'' / official works) excludes from copyright protection ''laws, decrees, international
  treaties or other official acts, decisions, protocols or reports by public authorities.'' A federal
  act published on Fedlex is squarely within Art. 5, so the authentic text is freely reproducible (as
  with Japanese/Chinese/Korean/Brazilian statutory text; JC-027). Source: the official Fedlex publication
  (Swiss Confederation, Federal Chancellery). The PDF states ''Massgebend ist die signierte elektronische
