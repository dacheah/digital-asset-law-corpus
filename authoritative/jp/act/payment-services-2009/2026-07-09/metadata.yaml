provenance_note: '資金決済に関する法律 (Payment Services Act), Act No. 59 of 2009, Japan — the CURRENT IN-FORCE
  consolidated version from e-Gov 法令検索 (the official Japanese legislation database, Digital Agency), retrieved
  9 Jul 2026. This is Japan''s Track A market-structure spine: it carries the crypto-asset exchange service-provider
  regime (暗号資産交換業) AND the electronic-payment-instrument / stablecoin regime (電子決済手段), alongside the pre-existing
  prepaid-payment-instrument (前払式支払手段) and funds-transfer (資金移動業) regimes. AUTHENTIC LANGUAGE: Japanese
  ONLY (authentic_languages=[ja]). This is the FIRST branch in the corpus where English is not authentic
  — under Japanese practice only the original Japanese has legal effect; any English rendering (including
  the Government''s own Japanese Law Translation) is UNOFFICIAL and belongs in the derived layer (JC-015).
  VERSION: the base Act No. 59 of 2009 was promulgated 24 Jun 2009 (平成二十一年法律第五十九号) and commenced 1 Apr
  2010; this consolidated text incorporates 12 amendments recorded in the XML SupplProvisions, the latest
  being Act No. 66 of 2025 (令和七年六月一三日法律第六六号, promulgated 13 Jun 2025, with full operational effect by
  13 Jun 2026). Because retrieval (9 Jul 2026) post-dates that commencement and the XML contains no not-yet-in-force
  (未施行) markers, the 2025 amendment''s provisions are present and in force in this snapshot — evidenced
  by the new intermediary category it introduced, defined here by its exact statutory term 「電子決済手段・暗号資産サービス仲介業」
  (electronic-payment-instrument / crypto-asset service intermediary business, Art. 2 ¶¶18–20), and the
  為替取引分析業 (exchange-transaction-analysis / travel-rule) business. (A secondary source''s loose gloss ''crypto-asset
  intermediary business'' does not match the enacted term; the record follows the primary text.) AUTHORITATIVENESS:
  the e-Gov current version has legal force, so this consolidated text is AUTHORITATIVE (recorded as official_consolidation)
  — like AU compilations and SG current versions, unlike EU (EUR-Lex) consolidations which are non-authentic
  (JC-009). SOURCE/FORMAT: original.xml is the e-Gov Standard Law XML (byte-exact anchor); text.txt is
  the Japanese authentic text extracted from the XML Law body (title → chapters/sections → articles →
  paragraphs/items → supplementary provisions 附則), preserving the full-width ideographic space (U+3000)
  that separates statutory labels from their captions (e.g. 第一章　総則). LICENCE: jp-law-noncopyright — Copyright
  Act of Japan Art. 13 excludes 法令 from copyright, so reproduction of the law text is unrestricted (JC-015);
  any third-party English translation has its own terms. Follow-ups queued: the Cabinet Office Orders
  (府令) implementing the crypto-asset and electronic-payment-instrument regimes; an unofficial English
  translation authored into the derived layer. Recorded on its own terms (JC-003/JC-007).'
