provenance_note: 'Vietnam''s Law on Digital Technology Industry (No. 71/2025/QH15), the first Vietnamese
  statute to define and recognise digital assets (tài sản số, Arts 46–48), classifying virtual vs crypto
  assets and mandating a management framework, with detailed market-structure rules delegated to Government
  decrees. Vietnamese authentic (Công báo); in force 1 January 2026. Implementing decrees to be added
  when issued. AUTHORITATIVENESS: authentic_text (framework/definitional). LICENCE: vn-law-noncopyright
  (IP Law Art. 15(2)). Recorded neutrally.'
