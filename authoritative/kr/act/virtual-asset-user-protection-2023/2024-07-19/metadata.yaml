provenance_note: '가상자산 이용자 보호 등에 관한 법률 (Act on the Protection of Virtual Asset Users; abbreviated 가상자산이용자보호법,
  ''VAUPA''), Republic of Korea — the CURRENT IN-FORCE version from 국가법령정보센터 (the official National Law
  Information Center), version 법률 제20372호 (promulgated 2024-03-12 by 타법개정, i.e. amendment via another
  Act — the 국회법 revision per its 부칙), in force from 19 Jul 2024. Originally enacted as 법률 제19563호 on 18
  Jul 2023 (referenced in this version''s 부칙 제3조). This is Korea''s enacted FIRST-PHASE Track A digital-asset
  market-structure statute: it defines 가상자산 (virtual assets) and 가상자산사업자 (virtual-asset service providers),
  protects user assets (예치금 safekeeping via banks, cold-storage and insurance/reserve requirements), prohibits
  unfair trading (제3장 불공정거래의 규제 — use of undisclosed material information, market manipulation, unfair
  trading practices), and gives the 금융위원회 (FSC) / 금융감독원 (FSS) supervision, investigation, and sanction
  powers (제4장), with penalties (제5장). SCOPE NOTE: Korea''s comprehensive SECOND-PHASE framework, the Digital
  Asset Basic Act (디지털자산기본법) — won-stablecoin issuance, broader VASP licensing — is NOT included: as of
  2026 it remains a BILL stalled in the National Assembly (a Bank-of-Korea vs FSC dispute over stablecoin
  issuers), so under the ''a bill is not law'' discipline it is a queue watch until enacted (JC-005/JC-019),
  like the US CLARITY Act. AUTHENTIC LANGUAGE: Korean (ko) ONLY — the third non-English-authentic branch
  (after JP and CN) and the third script (Hangul); the KLRI English translation is expressly unofficial
  and belongs in the derived layer. AUTHORITATIVENESS: law.go.kr''s 현행 (current) version has legal force,
  so this consolidated text is AUTHORITATIVE (recorded as official_consolidation) — like AU/SG/JP current
  versions, unlike EU (EUR-Lex) consolidations (JC-009). SOURCE/FORMAT: original.pdf is the official law.go.kr
  PDF (byte-exact anchor); text.txt is the enacted text (title + version header → 5 chapters 제1장–제5장,
  articles 제1조–제22조 → 부칙 addenda) with DISCLOSED cleaning: the law.go.kr page apparatus (the 법제처 / page-number
  / 국가법령정보센터 running header-footer and the 금융위원회 ministry-contact line) is removed; NOTHING is reordered.
  IMPORTANT FIDELITY NOTE: Korean is a space-delimited script and PDF line-wraps do not preserve inter-word
  spaces reliably, so the source PDF''s VISUAL LINE BREAKS ARE PRESERVED VERBATIM within each provision
  rather than rejoined — rejoining would either merge words (at mid-word wraps) or drop inter-word spaces
  (at word-boundary wraps), i.e. fabricate content. The cleaned text is verified as an EXACT, order-preserving
  match (8,602 characters) to the raw pdftotext output minus the disclosed apparatus. LICENCE: kr-law-noncopyright
  — Copyright Act of Korea Art. 7 excludes statutes from copyright (JC-019); law.go.kr content is additionally
  under the KOGL. Follow-ups queued: the Digital Asset Basic Act ON ENACTMENT; the VAUPA enforcement decree
  (시행령) and FSS rules; an unofficial English translation in the derived layer. Recorded on its own terms
  (JC-003/JC-005/JC-019).'
