provenance_note: 'The UAE FEDERAL framework decision for virtual assets: Cabinet Decision No. (111) of
  2022 on Regulating Virtual Assets and their Service Providers, issued 12 December 2022, published in
  Official Gazette No. 741 (15 Dec 2022) and in force from 14 January 2023 (30 days after publication).
  It defines virtual assets and VA activities, requires federal Securities and Commodities Authority (SCA)
  licensing/oversight of onshore VA service providers (excluding the financial free zones DIFC and ADGM,
  and payment-token/stored-value instruments reserved to the Central Bank), and empowers the SCA (renamed
  the Capital Market Authority, CMA, by Federal Decree-Laws 32 & 33 of 2025) to issue the implementing
  rulebook — see the related CMA Chairman Decision No. (4/R.M) of 2026. Arabic authentic. FIDELITY: extracted_verified
  (independent OCR cross-check, JC-038) — the authentic text is the official Legislation Portal''s server-rendered
  Arabic (complete: preamble citing the Constitution and eight named federal laws, then the 18 sequential
  articles المادة (1)–(18)). The byte-exact PDF anchor''s own text layer is degraded (presentation-form
  glyphs + U+FFFD), so instead of a char-for-char text-layer check the portal text was confirmed against
  the official PDF''s VISUAL content by an independent Arabic OCR (pdftoppm 300 dpi → tesseract -l ara;
  reproducible via scripts/verify_ocr.py) at 99.2% token / 97.4% char-5-gram agreement — the residual
  is OCR noise, not a content discrepancy. LICENCE: ae-law-noncopyright (Federal Decree-Law 38/2021 Art.
  3). Recorded neutrally.'
verification:
  status: verified
  method: 'text.txt (the authentic Arabic) was taken from the UAE Federal Legislation Portal (uaelegislation.gov.ae/ar/legislations/1623)
    — the official federal publisher — as its server-rendered HTML, which stores the decision in clean
    Unicode LOGICAL order. It was captured from the rendered browser DOM because the portal is a JavaScript-rendered
    single-page app whose raw HTML download is an empty ''please enable JavaScript'' shell (0 occurrences
    of المادة). WHY NOT THE PDF TEXT LAYER: the byte-exact official PDF (original.pdf) is kept as the
    integrity anchor, but — unlike the clean Dubai/CBUAE Gazette PDFs — its Arabic text layer is degraded
    (~6500 presentation-form glyphs and ~904 U+FFFD data-loss holes), so an INDEPENDENT char-for-char
    completeness cross-check is not possible; a same-document skeleton-token overlap of 59% (capped by
    the PDF''s corruption, not by the portal text) corroborates that the two are the same instrument.
    STRUCTURE: text.txt forms the COMPLETE consecutive sequence of 18 articles (المادة (1)–(18)) preceded
    by the enacting preamble (citing the Constitution and eight named federal laws and ending ''قـرّر'')
    and closing with the publication / entry-into-force article (Art. 18: published in the Official Gazette,
    in force 30 days after publication). INDEPENDENT OCR CROSS-CHECK (JC-038): because the byte-exact
    official PDF anchor''s Arabic text layer is degraded (presentation-form glyphs + U+FFFD), the portal
    text was confirmed against the official PDF''s VISUAL content by an independent Arabic OCR that reads
    the rendered glyphs, not the broken text layer (pdftoppm 300 dpi → tesseract -l ara --psm 6; reproducible
    via scripts/verify_ocr.py). After Arabic orthographic normalisation the stored text is covered by
    the OCR at 99.2% of token instances (98.1% of unique tokens) and 97.4% of character 5-grams; the residual
    is OCR noise, not a content discrepancy, and all 18 articles المادة (1)–(18) are present in both independent
    readings.'
