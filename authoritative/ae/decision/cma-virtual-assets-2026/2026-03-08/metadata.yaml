provenance_note: 'The UAE FEDERAL crypto rulebook: the Capital Market Authority (CMA — the renamed Securities
  and Commodities Authority) Chairman Decision No. (4/R.M) of 2026 on Regulating Virtual Assets, issued
  8 March 2026 (effective 9 March 2026), which replaces the prior SCA virtual-asset decisions and licenses
  virtual-asset activities federally (onshore, outside the DIFC and ADGM free zones). Arabic authentic.
  FIDELITY: extracted_verified (independent OCR cross-check, JC-038) — the pdftotext -layout extraction
