rights_note: 'Under the UAE Federal Decree-Law No. 38 of 2021 on Copyright, Article 3 excludes official
  documents — ''laws, regulations, resolutions and decisions … whatever their source or language'' — from
  copyright. A CBUAE regulation is an official regulation of a federal authority, within Art. 3, so the
  authentic Arabic text is freely reproducible (as with the Dubai VA law; JC-028). AUTHENTIC LANGUAGE:
  Arabic (a UAE federal regulation). The CBUAE also publishes an English text (in the official bilingual
  PDF); it is a translation → derived layer. SOURCE: the Central Bank of the UAE Rulebook (rulebook.centralbank.ae).'
