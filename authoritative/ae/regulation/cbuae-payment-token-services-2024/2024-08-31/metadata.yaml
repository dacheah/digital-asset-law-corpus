provenance_note: 'Payment Token Services Regulation (نظام خدمات رمز الدفع), CBUAE Circular No. C 2/2024,
  effective 31 August 2024 — the United Arab Emirates'' FEDERAL fiat-backed payment-token / stablecoin
  regime, issued by the Central Bank of the UAE. It sets the rules and conditions for licensing or registration
  to provide payment-token services — issuance, trading, and custody/transfer of payment tokens — distinguishing
  Dirham Payment Tokens (AED-denominated; require a CBUAE licence) from Foreign Payment Tokens (non-AED;
  require CBUAE registration), with prohibitions, licence categories and conditions, licensing procedures,
  CBUAE authority over licensees, restrictions on payment tokens, and capital requirements. Structure:
  a preamble (مقدّمة), 8 Parts (الجزء الأول–الثامن), 42 consecutive articles (المادة (1)–(42)) and an
  annex (ملحق) of application requirements. On-theme with the corpus''s stablecoin coverage (US GENIUS
  Act; Hong Kong Stablecoins Ordinance). AUTHENTIC LANGUAGE: Arabic (federal); the CBUAE''s English text
  (in the official bilingual PDF) is a translation → derived. AUTHORITATIVENESS: authentic_text — the
  official CBUAE publication. SOURCE/FORMAT: original.pdf is the official bilingual CBUAE PDF (byte-exact
  anchor); because its Arabic column extracts with RTL bidi artifacts, text.txt is the clean authentic
  Arabic taken from the CBUAE Rulebook''s server-rendered HTML and verified. FIDELITY (see verification
  block): the Arabic text matches the bilingual PDF''s Arabic content to within 0.5% (Arabic normalisation
  + PDF page apparatus), and forms the complete structure — preamble, 8 Parts, the consecutive sequence
  of 42 articles, and the annex. LICENCE: ae-law-noncopyright — UAE Federal Decree-Law 38/2021 Art. 3
  (JC-028/030). Recorded neutrally (JC-003/JC-005/JC-006).'
