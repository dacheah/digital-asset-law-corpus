rights_note: 'Under the UAE Federal Decree-Law No. 38 of 2021 on Copyright and Neighbouring Rights, Article
  3 excludes OFFICIAL DOCUMENTS — laws, regulations, resolutions and decisions, international conventions,
  judicial judgments and the like, whatever their source or language — from copyright protection. Law
  No. 4 of 2022 is a Dubai law (an official document) within Art. 3, so the authentic Arabic text is freely
  reproducible (as with Japanese/Chinese/Korean/Brazilian/Swiss official texts; JC-028). AUTHENTIC LANGUAGE:
  Arabic — the corpus''s first Arabic / right-to-left text. The official English translation on the Dubai
