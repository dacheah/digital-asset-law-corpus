provenance_note: 'Law No. (4) of 2022 Regulating Virtual Assets in the Emirate of Dubai — the United Arab
  Emirates'' flagship virtual-asset market-structure instrument, issued 28 February 2022 by H.H. Sheikh
  Mohammed bin Rashid Al Maktoum, Ruler of Dubai, and published in the Official Gazette of the Government
  of Dubai (Year 56, Issue 559, 11 March 2022). It ESTABLISHES the Dubai Virtual Assets Regulatory Authority
  (VARA) — the world''s first dedicated virtual-asset regulator — and makes virtual-asset activities permit-required.
  28 ARTICLES in 4 CHAPTERS: Ch. 1 preliminary provisions and definitions (Art. 1–3, incl. the definitions
  of virtual asset, virtual token, virtual-asset platform, distributed-ledger technology, wallet, and
  service provider; scope = the Emirate of Dubai excluding the DIFC, Art. 3); Ch. 2 VARA''s regulatory
  framework — establishment, objectives, competences, board and management (Art. 4–14); Ch. 3 regulating
  virtual assets — the permit-required activities (operating a virtual-asset platform; exchange services
  between virtual assets and currencies and between virtual assets; transfer, safekeeping and wallet/administration
  services; and virtual-token offering and trading), permits, obligations and penalties (Art. 15–23);
  Ch. 4 final provisions — grievances, delegation, implementing decisions, repeals, publication and entry
  into force (Art. 24–28). Regulator: VARA. AUTHENTIC LANGUAGE: Arabic (the corpus''s first Arabic / right-to-left
  branch); the Dubai Legislation Portal''s English is an UNOFFICIAL translation (Arabic prevails) held
  in derived/. AUTHORITATIVENESS: authentic_text — the official Gazette publication. SOURCE/FORMAT: original.pdf
  is the official Arabic Gazette PDF (byte-exact anchor); because the PDF''s text layer extracts with
  right-to-left bidi artifacts, text.txt is the clean authentic Arabic taken from the portal''s server-rendered
  HTML (logical order) and verified. FIDELITY (see verification block): text.txt is character-complete
  against the byte-exact Gazette PDF body (alnum delta 11, i.e. Arabic orthographic-normalisation noise
  only), forms the complete consecutive sequence of 28 articles across 4 chapters, and aligns article-for-article
  with the official English translation (also 28 articles). WATCH/FOLLOW-UPS (JC-028): VARA''s Virtual
  Assets and Related Activities Regulations 2023 + rulebooks (the substantive rules), the UAE federal
  CMA regime and CBUAE stablecoin regulation, and the DIFC/ADGM free-zone frameworks — separate regimes,
  recorded separately, never merged. LICENCE: ae-law-noncopyright — UAE Federal Decree-Law 38/2021 Art.
  3 (JC-028). Recorded neutrally, on its own terms (JC-003/JC-005/JC-006).'
