provenance_note: '关于进一步防范和处置虚拟货币等相关风险的通知 (Notice on Further Preventing and Dealing with Virtual Currency
  and Other Related Risks), PBC Doc. 银发〔2026〕42号 (Yin Fa [2026] No. 42), mainland China — issued 6 Feb
  2026 by EIGHT authorities: 中国人民银行 (PBoC), 国家发展改革委 (NDRC), 工业和信息化部 (MIIT), 公安部 (MPS), 市场监管总局 (SAMR),
  金融监管总局 (NFRA), 中国证监会 (CSRC), 国家外汇局 (SAFE). This is mainland China''s Track A market-structure instrument
  — recorded as a PROHIBITION (China''s regime bans, rather than licenses, digital-asset market activity).
  It reaffirms that virtual currencies (比特币/以太币/泰达币 etc.) have NO legal-tender status (不具有法偿性) and that
  virtual-currency business is illegal financial activity (非法金融活动), and it NEWLY (i) bars issuance of
  RMB-pegged STABLECOINS (稳定币) onshore or offshore without approval and (ii) restricts REAL-WORLD-ASSET
  (现实世界资产 / RWA) TOKENISATION — addressing stablecoins and RWA that the 2021 notice did not. Structure:
  6 articles (一 nature of virtual currency/RWA; 二 working mechanisms; 三 risk monitoring incl. the ''mining''
  挖矿 clampdown and a ban on registering firms with names/scope containing ''虚拟货币''/''稳定币''/''RWA'' etc.;
  四 strict supervision of domestic entities operating overseas; 五 organisation; 六 legal liability) with
  19 sub-items （一）–（十九）. SUPERSESSION: it expressly REPEALS the 2021 ten-agency notice — 中国人民银行等十部门《关于进一步防范和处置虚拟货币交易炒作风险的通知》（银发〔2021〕237号）同时废止
  (recorded in supersedes; the 2021 predecessor is queued for ingest as the superseded record). AUTHENTIC
  LANGUAGE: Simplified Chinese (zh-Hans) ONLY — mainland''s script, DISTINCT from the Hong Kong records''
  Traditional Chinese (zh-Hant); different legal system, never conflated. English is unofficial → derived
  (JC-017), the corpus''s second non-English-authentic branch after Japan. AUTHORITATIVENESS: authentic_text
  — the PBoC web page is the official publication of the notice, so its text is the authentic text; captured
  via browser print-to-PDF (the official publication medium for PRC 规范性文件 is the web page, not a separate
  signed PDF). SOURCE/FORMAT: original.pdf is that print-to-PDF (integrity anchor); text.txt is the notice
  body (title → addressees → preamble citing the enabling statutes → 6 articles/19 sub-items → effective-and-repeal
  clause → eight-agency signature → date 2026年2月6日), extracted with DISCLOSED removal of webpage chrome
  only (the PBoC site navigation menu, the 字号 font-size widget, the 打印本页/关闭窗口 buttons, and the page publish-time
  stamp) — the extracted body is an EXACT, order-preserving match to the raw pdftotext body minus that
  chrome (4,368 characters; no operative content added or lost). LICENCE: cn-law-noncopyright — Copyright
  Law of the PRC Art. 5(1) excludes official administrative documents from copyright (JC-017), so reproduction
  is unrestricted. Follow-ups queued: the superseded 2021 notice (银发〔2021〕237号); the e-CNY / digital-RMB
  framework only if a clean legal instrument exists (else watch, JC-005); the 2017 ICO ban. Recorded on
  its own terms (JC-003/JC-006/JC-007/JC-017).'
