rights_note: 'Under the Copyright Law of the People''s Republic of China, Article 5(1), the law does not
  apply to ''laws and regulations, resolutions, decisions and orders of State organs, other documents
  of a legislative, administrative or judicial nature and the official translations thereof'' (本法不适用于：（一）法律、法规，国家机关的决议、决定、命令和其他具有立法、行政、司法性质的文件，及其官方正式译文).
  A PBoC-led inter-agency notice (通知) is a normative document of an administrative nature issued by State
  organs and therefore falls within Art. 5(1); the authentic Chinese text is freely reproducible (analogous
  to Japan''s Copyright Act Art. 13 and US federal public-domain, reached via the ''official documents''
  route). Source: the official PBoC publication (pbc.gov.cn). NOTE: any English rendering (including an
  agency-posted English version) is UNOFFICIAL — only the Chinese original has legal effect — and is kept
  in the derived layer under its own terms, never in the authoritative layer. Caveat recorded honestly:
  this rests on the standard characterisation of an agency 通知 as an administrative-nature document under
  Art. 5(1).'
