provenance_note: '关于进一步防范和处置虚拟货币交易炒作风险的通知 (Notice on Further Preventing and Dealing with the Risks of
  Virtual Currency Trading and Speculation), PBC Doc. 银发〔2021〕237号 (Yin Fa [2021] No. 237), mainland China
  — issued 15 Sept 2021 by TEN authorities: 中国人民银行 (PBoC), 中央网信办 (CAC), 最高人民法院 (Supreme People''s Court),
  最高人民检察院 (Supreme People''s Procuratorate), 工业和信息化部 (MIIT), 公安部 (MPS), 市场监管总局 (SAMR), 银保监会 (CBIRC — abolished
  2023, its functions passing to 金融监管总局/NFRA), 证监会 (CSRC), 外汇局 (SAFE). This is the FOUNDATIONAL mainland-China
  virtual-currency prohibition and a landmark, widely-cited instrument: it establishes that virtual currencies
  (比特币/以太币/泰达币 etc.) have NO legal-tender status (不具有法偿性) and that virtual-currency-related business (fiat↔VC
  and VC↔VC exchange, acting as central counterparty, token issuance financing, VC derivatives, etc.)
  is illegal financial activity (非法金融活动) to be strictly prohibited, and that overseas exchanges providing
  services to PRC residents are likewise illegal. Structure: 5 articles (一 nature of virtual currency;
  二 working mechanisms; 三 risk monitoring and early warning; 四 a multi-dimensional risk-prevention and
  disposal system; 五 organisation) with 16 sub-items （一）–（十六）. SUPERSESSION: this notice is SUPERSEDED
  BY the 2026 Notice 银发〔2026〕42号 (关于进一步防范和处置虚拟货币等相关风险的通知), which expressly repealed it (同时废止) and extended
  the regime to RMB-pegged stablecoins and RWA tokenisation — recorded here in superseded_by, with the
  2026 record''s supersedes pointing back (a bidirectional link showing the prohibition''s evolution;
  JC-024). Preserved append-only as the superseded predecessor: it was the operative prohibition from
  2021 until Feb 2026. AUTHENTIC LANGUAGE: Simplified Chinese (zh-Hans) only; English unofficial → derived
  (JC-017). AUTHORITATIVENESS: authentic_text — the official PBoC web publication of the notice. SOURCE/FORMAT:
  original.pdf is a browser print-to-PDF of the official PBoC page; text.txt is the notice body (ten-agency
  title → addressees → preamble citing the enabling statutes → 5 articles/16 sub-items → ten-agency signature
  → date 2021年9月15日), with DISCLOSED removal of webpage chrome only (site navigation, the 字号 font-size
  widget, the 打印本页/关闭窗口 buttons, and the publish-time stamp); the extracted body is an EXACT, order-preserving
  match to the raw pdftotext body minus that chrome (2,740 characters). LICENCE: cn-law-noncopyright —
  Copyright Law of the PRC Art. 5(1) (JC-017). Recorded on its own terms (JC-003/JC-006/JC-007/JC-017/JC-024).'
