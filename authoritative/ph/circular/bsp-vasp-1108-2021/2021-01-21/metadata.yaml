provenance_note: 'The Philippines'' virtual-asset service-provider regime: BSP Circular No. 1108 (2021)
  regulates VASPs as money-service businesses (Certificate of Authority, minimum capital, customer due
  diligence, travel rule, wallet/cyber controls) under the BSP. English authentic; the Philippines has
  no discrete crypto statute — the regime is regulator-made but binding. On-theme companion: the SEC''s
  Crypto-Asset Service Provider (CASP) Rules 2025 (MC No. 4) — to be added. AUTHORITATIVENESS: authentic_text.
  LICENCE: ph-gov-noncopyright (IP Code s176). Recorded neutrally.'
