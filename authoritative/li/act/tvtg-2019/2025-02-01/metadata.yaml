provenance_note: 'Liechtenstein''s pioneering blockchain law: the Token- und VT-Dienstleister-Gesetz (TVTG,
  ''Token and Trustworthy Technology Service Provider Act'') of 3 October 2019 (LGBl. 2019 Nr. 301, LR
  950.6). It creates a civil-law ''token container'' model and a registration regime for TT service providers.
  German authentic. Captured as the official consolidated version (Stand 1 Feb 2025). Its national token/civil-law
  core sits alongside, and is not subsumed by, the EU MiCA regime. AUTHORITATIVENESS: official_consolidation.
  LICENCE: li-law-noncopyright (URG Art. 5). Recorded neutrally.'
