provenance_note: 'OCC notice of proposed rulemaking (NPRM) implementing the GENIUS Act — the AS-PUBLISHED,
  POINT-IN-TIME PROPOSED state. Published 2026-03-02 at 91 FR 10202 (pp. 10202–10303); FR Doc. 2026-04089;
  Docket OCC-2025-0372; RIN 1557-AF41; comment period closed 2026-05-01. Proposes a new 12 CFR part 15
  (payment stablecoins) and conforming amendments to 12 CFR parts 3, 6, 8, and 19. STATUS: PROPOSED, not
  final — when the OCC finalises this rulemaking, the final rule will be ingested as a NEW dated version
  that supersedes this one (append-only; see queue/candidates.md). original.pdf is the canonical govinfo
  Federal Register PDF and is the byte-exact integrity anchor. text.txt is the full document text (preamble/SUPPLEMENTARY
  INFORMATION + proposed regulatory text) extracted from the official Federal Register full-text XML of
  the same document (FR DTD), chosen for clean structure. Disclosed text normalizations (wording unchanged):
  Unicode spaces — including the thin space (U+2009) the source places between ''§'' and section numbers
  — collapsed to regular spaces; invisible soft hyphens removed; canonical UTF-8/LF applied by tooling.
  Implements the GENIUS Act (Pub. L. 119-27); cross-referenced via related_documents.'
