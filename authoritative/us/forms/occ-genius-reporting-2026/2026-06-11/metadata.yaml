provenance_note: 'OCC Bulletin 2026-24 (issued 2026-06-11) announces GENIUS Act reporting for OCC-supervised
  permitted and foreign payment stablecoin issuers (PPSI/FPSI): Form PS-01 (weekly activity & reserve
  reporting) and Form PS-02 (quarterly reports of condition and income). THIS RECORD is attachment a —
  the Notice and Request for Comment, a Paperwork Reduction Act (PRA) notice inviting comment on the new
  information collection; the collection remains subject to OMB approval (OMB control number pending).
  Package: (a) this Notice; (b) PS-01 instructions and (d) PS-02 instructions — ingested as their own
  cross-referenced records; (c) Form PS-01 and (e) Form PS-02 — MS Excel templates REFERENCED by URL,
  not stored [https://www.occ.gov/news-issuances/bulletins/2026/bulletin-2026-24c.xlsx ; https://www.occ.gov/news-issuances/bulletins/2026/bulletin-2026-24e.xlsx].
  original.pdf is the byte-exact OCC PDF. Text extracted from the stored official OCC PDF via pdftotext
  with disclosed conservative cleaning (page-break form-feeds to paragraph breaks; table-of-contents dot
  leaders collapsed; whitespace normalized; bare page-number lines removed; canonical UTF-8/LF by tooling).
  Wording unchanged; word counts reconcile with the raw extraction. Implements the reporting apparatus
  of the OCC payment-stablecoins rule under the GENIUS Act.'
