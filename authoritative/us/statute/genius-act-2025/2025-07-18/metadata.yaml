provenance_note: 'GENIUS Act, enacted (approved) 2025-07-18. original.pdf is the canonical govinfo Public
  Law PDF (package PLAW-119publ27) and is the byte-exact integrity anchor. text.txt is the authentic statutory
  text extracted from GPO''s official USLM XML of the same package, chosen because USLM cleanly separates
  the enacted text from Statutes-at-Large apparatus (running heads, marginal side-notes, page markers).
  Disclosed text normalizations: invisible discretionary hyphen (U+00AD) removed (1 occurrence); block-level
  provisions separated by a single space; canonical UTF-8/LF applied by tooling. Statutory wording is
  unchanged; quote glyphs follow the USLM source (proper curly double quotes) rather than the PDF''s traditional
  doubled-single-quote style. Staged effectiveness: substantive provisions take effect on the earlier
  of 18 months after enactment or 120 days after the primary federal payment-stablecoin regulators issue
  final implementing rules — effective_date left null pending that trigger. Section 8 (Anti-Money Laundering
  Protections) is the Track B/AML interface point; the AML/VASP substance is owned by the sibling AML
  corpus (Project Origin) and cross-referenced, not reproduced here (design-lock JC-004).'
