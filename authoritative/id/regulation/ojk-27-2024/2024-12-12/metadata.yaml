provenance_note: 'Indonesia''s market-structure regime for digital financial assets and crypto: POJK No.
  27 of 2024, issued after crypto oversight moved from Bappebti to the OJK under the P2SK Law (UU No.
  4 of 2023). It covers asset eligibility, operator institutions (exchange, clearing, custody), licensing,
  governance, trading conduct, reporting and supervision. Indonesian authentic; in force 1 Oct 2025. Amendment
  POJK 23/2025 to be added as a dated version. AUTHORITATIVENESS: authentic_text (Salinan). LICENCE: id-law-noncopyright
