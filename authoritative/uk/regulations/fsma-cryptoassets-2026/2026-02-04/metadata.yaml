provenance_note: 'The Financial Services and Markets Act 2000 (Cryptoassets) Regulations 2026 (S.I. 2026
  No. 102) — the United Kingdom''s first in-force cryptoasset market-structure instrument, made 4 February
  2026 by HM Treasury under the Financial Services and Markets Act 2000 (c. 8) via the draft-affirmative
  procedure (a draft was laid before, and approved by resolution of, each House of Parliament, then made).
  This is Track A market structure: it brings cryptoassets inside the FSMA regulated-activities / designated-activities
  perimeter. EIGHT PARTS: (1) general — citation, commencement (full commencement day 25 October 2027
  (reg. 1(2)), with FCA-preparatory provisions in force 21 days after making (reg. 1(3))), interpretation,
  and UK-wide extent (England and Wales, Scotland, Northern Ireland); (2) ''Markets in cryptoassets: designated
  activities'' — Chapter 1 qualifying cryptoasset public offers and admissions to trading (disclosure
  documents, liability for untrue/misleading statements, withdrawal rights) and Chapter 2 market abuse
  in qualifying cryptoassets (insider dealing, unlawful disclosure of inside information, manipulation);
  (3) amendment of the Regulated Activities Order 2001 to specify new cryptoasset regulated activities
  (issuing qualifying stablecoin, safeguarding qualifying cryptoassets, operating a qualifying cryptoasset
  trading platform, dealing, arranging, staking); (4) amendment of the Act (FSMA) itself; (5) amendment
  of the Financial Promotion Order 2005; (6) consequential amendment of other secondary legislation; (7)
  savings and transitional provision; (8) review. 65 regulations and 2 Schedules (Schedule 1 — exceptions
  from the prohibition of public offers (reg. 10); Schedule 2 — compensation exemptions (reg. 14)); signed
  by two Lords Commissioners of His Majesty''s Treasury (Stephen Morgan; Christian Wakeford), 4 February
  2026. WATCH (NOT ingested; JC-005): the FCA Handbook conduct rules for the regime (consulted / phased
  from 2027) and the separately-published DRAFT statutory instrument amending these Regulations — each
  ingested only when made; and the fiat-backed stablecoin regime if/when put in force. AUTHENTIC LANGUAGE:
  English. AUTHORITATIVENESS: authentic_text — the official ''made'' (as-made) version (no consolidation).
  SOURCE/FORMAT: captured from legislation.gov.uk (The National Archives / King''s Printer of Acts of
  Parliament) in two official formats — original.pdf (byte-exact integrity anchor) and the CLML XML (made/data.xml;
  the structured authentic-text source from which text.txt was extracted). FIDELITY (see the verification
  block): text.txt is an EXACT alphanumeric match to the authoritative CLML XML (122,672 alnum characters;
  no operative content added, lost, or reordered); all 70 footnotes and their in-text superscript markers
  are preserved; 100% of the XML''s word tokens are present in the official PDF; and the captured text
  was independently cross-checked against the live legislation.gov.uk pages (made date, enabling powers,
  the eight Parts, the signatories, and regulation 1''s commencement and extent). Disclosed rendering
  (wording unchanged): heading case (PART/CHAPTER/SCHEDULE), provision numbering (''N.'', ''N.—(1)'',
  ''(a)'', ''(i)''), footnote references rendered as superscript markers with the footnote bodies collected
  in a closing ''Footnotes'' section (matching legislation.gov.uk''s sequential-number web convention),
  and the one XHTML amendment table rendered as a tab-delimited row. LICENCE: uk-ogl-v3 — Open Government
