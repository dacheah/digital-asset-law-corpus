provenance_note: 'Markets in Crypto-Assets Regulation (MiCA) — the AS-ADOPTED OJ authentic text (CELEX
  32023R1114; OJ L 150, 9.6.2023, p. 40). Adopted 2023-05-31; entered into force 2023-06-29; STAGED APPLICATION
  — Titles III and IV (asset-referenced tokens and e-money tokens) apply from 2024-06-30, the remainder
  from 2024-12-30 (effective_date left null as application is staged). AUTHENTIC LANGUAGE: all 24 EU official
  languages are equally authentic; this record stores the ENGLISH authentic text (English-first, JC-008)
  and records all 24 in authentic_languages — English is authentic, not a translation. original.pdf is
  the EUR-Lex OJ PDF and is the byte-exact integrity anchor. text.txt is extracted from that PDF (single-column
  OJ; pdftotext) with disclosed cleaning (wording unchanged): OJ running headers removed; soft-hyphen
  line-breaks joined; residual soft hyphens stripped; 12 line-break hyphen-loss compounds restored to
  their hyphenated form (e.g. crypto-asset, e-money, third-country) — each restoration VERIFIED against
  the authentic EUR-Lex HTML rendering; one ''up-to-date'' repaired; canonical UTF-8/LF by tooling. Cross-checked
  against the authentic EUR-Lex HTML (~99.9% word-type overlap; all 149 articles and 9 Titles present);
  residual set-difference tokens are a footnote page number and HTML-tokenisation false positives, not
  content loss. FOLLOW-UP VERSIONS (see queue/candidates.md): MiCA corrigenda (through 2024) are authentic
  dated corrections; the EUR-Lex CONSOLIDATED version (2024-01-09) is a NON-AUTHENTIC reference (EUR-Lex''s
  own disclaimer) and will never be presented as the authentic text (JC-009). Track B: MiCA''s AML sibling
  (the Transfer of Funds Regulation; AMLR) is owned by the sibling AML corpus (Project Origin) and referenced,
  not reproduced. Recorded on its own terms — no cross-jurisdiction ''lead/reaction'' relationship is
  encoded in the authoritative layer (JC-003/JC-007).'
